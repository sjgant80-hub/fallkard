<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FallKard · the Loom · Deck Builder</title>
<meta name="description" content="Build 30-card decks. Curve visualiser. Chamber and kind rings. Save to IndexedDB. Export as signed URL, JSON, or forkable fork. 4 preset decks."/>
<link rel="canonical" href="https://sjgant80-hub.github.io/fallkard/loom.html"/>
<meta name="theme-color" content="#0b0a0f"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --void:#0b0a0f; --shard:#141218; --shard2:#191720; --dim:#3d3a45; --muted:#8a857a; --text:#c4bfb2;
  --gold:#d4a017; --brass:#b8974a; --amber:#e8a83a; --rose:#e6846e; --sage:#7ab88a;
  --ox:#8b1a1a; --sap:#4a7dc9; --jade:#3fa068; --plum:#9a6dbf;
  --border:rgba(212,160,23,0.14); --hard:rgba(212,160,23,0.32);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--void); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; }
body {
  background:
    radial-gradient(ellipse at 30% 12%, rgba(212,160,23,0.05), transparent 55%),
    radial-gradient(ellipse at 78% 88%, rgba(230,132,110,0.04), transparent 55%),
    var(--void);
  min-height: 100vh;
  color: var(--text);
  padding-bottom: 62px;
}
a { color: var(--brass); text-decoration: none; }
a:hover { color: var(--gold); }
button { background: none; border: none; color: inherit; font: inherit; cursor: pointer; }

/* topbar (mirrors index.html) */
.topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 20px; padding: 14px 24px; background: rgba(11,10,15,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--gold); }
.brand-name { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; color: var(--text); }
.tabs { display: flex; gap: 4px; margin-left: 24px; }
.tab { padding: 8px 14px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); cursor: pointer; border: 1px solid transparent; border-radius: 4px; }
.tab.active { color: var(--gold); border-color: var(--border); background: var(--shard); }
.tab.disabled { color: var(--dim); cursor: not-allowed; }
.tab.disabled:after { content: " · soon"; font-size: 9px; color: var(--dim); }
.spacer { flex: 1; }
.deck-name { display: flex; align-items: center; gap: 10px; background: var(--shard); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; min-width: 240px; }
.deck-name input { background: none; border: none; outline: none; color: var(--gold); font-family: 'Libre Baskerville', serif; font-size: 16px; width: 100%; font-weight: 700; }
.deck-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--shard); }
.deck-count b { color: var(--gold); font-weight: 700; }
.deck-count.full b { color: var(--sage); }
.deck-count.over b { color: var(--rose); }

/* main layout */
.stage { display: grid; grid-template-columns: 300px 1fr 320px; gap: 0; min-height: calc(100vh - 60px); }
@media (max-width: 1200px) { .stage { grid-template-columns: 260px 1fr 280px; } }
@media (max-width: 940px) { .stage { grid-template-columns: 1fr; } }

/* DECK column */
.deck-col { position: sticky; top: 62px; align-self: start; height: calc(100vh - 62px); overflow-y: auto; padding: 18px 16px 18px; border-right: 1px solid var(--border); background: rgba(20,18,24,0.4); }
.deck-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.deck-title button { color: var(--muted); font-size: 9px; letter-spacing: 0.12em; }
.deck-title button:hover { color: var(--rose); }
.cost-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; padding: 4px 6px; border-radius: 3px; }
.cost-row:hover { background: rgba(212,160,23,0.05); }
.cost-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold); width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; background: rgba(212,160,23,0.14); border-radius: 3px; flex-shrink: 0; font-weight: 700; }
.cost-row .sigil { font-family: 'DM Mono', monospace; font-size: 12px; flex-shrink: 0; }
.cost-row .name { flex: 1; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cost-row .name.uber { color: var(--rose); font-weight: 700; }
.cost-row .name.unique { color: var(--brass); }
.cost-row .copies { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; padding: 2px 6px; background: var(--shard); border-radius: 3px; }
.cost-row .rm { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dim); cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.cost-row .rm:hover { color: var(--rose); }
.deck-empty { color: var(--dim); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-align: center; padding: 40px 12px; }
.deck-group { margin-bottom: 8px; }
.deck-group-head { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); padding: 6px 4px 3px; border-bottom: 1px solid rgba(212,160,23,0.06); margin-bottom: 4px; }

/* POOL column (middle) */
.pool-col { padding: 18px 22px 18px; }
.pool-filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.pool-filters input.search { flex: 1; min-width: 180px; background: var(--shard); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; }
.pool-filters input.search::placeholder { color: var(--dim); }
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 9px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); cursor: pointer; transition: all 0.12s; background: var(--shard); }
.chip:hover { color: var(--text); border-color: var(--hard); }
.chip.active { color: var(--void); background: var(--gold); border-color: var(--gold); font-weight: 700; }
.chip.rar-uber-unique.active { background: var(--rose); border-color: var(--rose); }

.pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.pcard { position: relative; aspect-ratio: 300/420; background: var(--shard); border-radius: 6px; cursor: pointer; overflow: hidden; transition: transform 0.12s, box-shadow 0.15s, border-color 0.12s; border: 1px solid rgba(212,160,23,0.08); }
.pcard:hover { transform: translateY(-2px); }
.pcard svg { width: 100%; height: 100%; display: block; pointer-events: none; }
.pcard .in-deck-badge { position: absolute; top: 6px; right: 6px; background: rgba(212,160,23,0.94); color: var(--void); font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 700; z-index: 2; }
.pcard.at-max { opacity: 0.45; cursor: not-allowed; }
.pcard.at-max:hover { transform: none; }
.pcard.rar-magic:hover { box-shadow: 0 4px 16px rgba(74,125,201,0.4); border-color: var(--sap); }
.pcard.rar-rare:hover  { box-shadow: 0 4px 18px rgba(212,160,23,0.4); border-color: var(--gold); }
.pcard.rar-unique:hover{ box-shadow: 0 4px 22px rgba(184,151,74,0.5); border-color: var(--brass); }
.pcard.rar-uber-unique { animation: uber-pulse 2.6s ease-in-out infinite; }
.pcard.rar-uber-unique:hover { box-shadow: 0 5px 26px rgba(230,132,110,0.6); border-color: var(--rose); }
@keyframes uber-pulse { 0%,100%{box-shadow:0 0 10px rgba(230,132,110,0.24)}50%{box-shadow:0 0 18px rgba(230,132,110,0.45)} }

.pool-status { padding: 20px 0 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; }
.pool-status b { color: var(--gold); }

/* ANALYTICS column */
.anal-col { position: sticky; top: 62px; align-self: start; height: calc(100vh - 62px); overflow-y: auto; padding: 18px 20px 30px; border-left: 1px solid var(--border); background: rgba(20,18,24,0.4); }
.section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.section-title:first-child { margin-top: 0; }

.curve-bar-row { display: flex; align-items: flex-end; gap: 3px; height: 100px; padding: 4px 0; }
.curve-bar { flex: 1; background: var(--shard); border-radius: 2px 2px 0 0; position: relative; min-height: 4px; transition: height 0.2s; }
.curve-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, var(--gold), var(--brass)); border-radius: 2px 2px 0 0; }
.curve-bar-fill.over { background: linear-gradient(180deg, var(--rose), var(--ox)); }
.curve-bar-count { position: absolute; top: -14px; left: 0; right: 0; text-align: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--gold); }
.curve-labels { display: flex; gap: 3px; padding-top: 4px; }
.curve-label { flex: 1; text-align: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }

.donut-wrap { display: flex; align-items: center; gap: 14px; }
.donut { width: 90px; height: 90px; flex-shrink: 0; }
.donut-legend { flex: 1; }
.donut-item { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text); margin: 3px 0; letter-spacing: 0.06em; }
.donut-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.donut-item .cnt { margin-left: auto; color: var(--muted); }

.dist-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
.dist-row .lbl { flex: 1; text-transform: uppercase; }
.dist-row .lbl b { color: var(--text); font-weight: 500; }
.dist-row .bar { flex: 2; height: 4px; background: var(--shard); border-radius: 2px; overflow: hidden; }
.dist-row .bar-fill { height: 100%; background: var(--gold); }
.dist-row .cnt { color: var(--gold); font-weight: 700; }

.warnings { padding: 10px 12px; background: rgba(230,132,110,0.05); border-left: 2px solid var(--rose); font-family: 'DM Mono', monospace; font-size: 10px; color: var(--rose); line-height: 1.6; margin-top: 10px; letter-spacing: 0.06em; }
.warnings:empty { display: none; }
.warnings b { color: var(--rose); font-weight: 700; }
.validity { padding: 12px 14px; margin-top: 10px; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; text-align: center; }
.validity.ok { background: rgba(122,184,138,0.1); color: var(--sage); border: 1px solid var(--sage); }
.validity.no { background: rgba(230,132,110,0.08); color: var(--rose); border: 1px solid var(--rose); }

/* Bottom action bar */
.actions { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; display: flex; align-items: center; gap: 8px; padding: 10px 24px; background: rgba(11,10,15,0.94); border-top: 1px solid var(--border); backdrop-filter: blur(6px); flex-wrap: wrap; }
.action { padding: 8px 14px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; border: 1px solid var(--border); border-radius: 4px; color: var(--text); background: var(--shard); cursor: pointer; transition: all 0.14s; }
.action:hover { color: var(--gold); border-color: var(--gold); }
.action.primary { background: var(--gold); color: var(--void); border-color: var(--gold); font-weight: 700; }
.action.primary:hover { background: var(--amber); color: var(--void); }
.action.warn:hover { color: var(--rose); border-color: var(--rose); }
.action-group { display: flex; gap: 4px; align-items: center; }
.action-group .sep { color: var(--dim); margin: 0 4px; }

/* Modal */
.modal-veil { position: fixed; inset: 0; z-index: 100; background: rgba(11,10,15,0.9); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 30px; }
.modal-veil.open { display: flex; }
.modal { max-width: 640px; width: 100%; background: linear-gradient(180deg, var(--shard2), var(--shard)); border: 1px solid var(--gold); border-radius: 10px; padding: 22px 26px; box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(212,160,23,0.2); }
.modal h2 { font-family: 'Libre Baskerville', serif; font-size: 22px; color: var(--gold); margin-bottom: 6px; }
.modal .sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.modal label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 12px 0 6px; }
.modal input, .modal textarea, .modal select { width: 100%; background: var(--shard); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; outline: none; resize: vertical; }
.modal textarea { min-height: 100px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.deck-list { max-height: 240px; overflow-y: auto; margin-top: 8px; }
.deck-list-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 4px; margin: 3px 0; background: var(--shard); border: 1px solid var(--border); }
.deck-list-row:hover { border-color: var(--gold); }
.deck-list-row .n { flex: 1; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; }
.deck-list-row .m { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; }
.deck-list-row .del { color: var(--rose); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; padding: 2px 8px; border: 1px solid var(--rose); border-radius: 3px; }
</style>

<script>
'use strict';

const STATE = {
  cards: [],
  manifest: null,
  cardsByID: {},
  filtered: [],
  deck: {},              // id → count
  house: null,           // Phase 2 doesn't ship houses yet, but reserved
  filters: {
    rarity: new Set(),
    kind: new Set(),
    chamber: new Set(),
    search: ''
  },
  db: null
};

const RARITY_ORDER = ['uber-unique', 'unique', 'rare', 'magic', 'common'];
const rarityIdx = { 'uber-unique':0, unique:1, rare:2, magic:3, common:4 };
const rIdx = r => rarityIdx[r] ?? 9;
const RARITY_BORDER = {
  common:{c:'#b8b6ad',g:0}, magic:{c:'#4a7dc9',g:4}, rare:{c:'#d4a017',g:8},
  unique:{c:'#b8974a',g:14}, set:{c:'#3fa068',g:10}, 'uber-unique':{c:'#c46a2e',g:20},
  runeword:{c:'#e6846e',g:12}, charm:{c:'#9a6dbf',g:8}
};
const KIND_COLORS = { sdk:'#c46a2e', api:'#4a9d8f', mcp:'#9a6dbf', tool:'#d4a017', surface:'#e8a83a', wellness:'#e6846e' };
const KIND_SHAPE = { sdk:'pillar', api:'tower', mcp:'loom', tool:'blade', surface:'arch', wellness:'well' };

function maxCopiesFor(card) {
  if (card.rarity === 'uber-unique' || card.rarity === 'unique') return 1;
  return 2;
}
function deckSize() { return Object.values(STATE.deck).reduce((s,n)=>s+n, 0); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─────────── IndexedDB
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('fallkard', 2);
    req.onerror = () => rej(req.error);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('decks')) {
        db.createObjectStore('decks', { keyPath: 'name' });
      }
      if (!db.objectStoreNames.contains('inventory')) {
        db.createObjectStore('inventory', { keyPath: 'id' });
      }
    };
    req.onsuccess = () => res(req.result);
  });
}
async function saveDeckDB(name, deck) {
  const db = STATE.db;
  return new Promise((res, rej) => {
    const tx = db.transaction('decks', 'readwrite');
    tx.objectStore('decks').put({ name, deck, saved: new Date().toISOString(), size: Object.values(deck).reduce((s,n)=>s+n,0) });
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function listDecksDB() {
  const db = STATE.db;
  return new Promise((res, rej) => {
    const out = [];
    const tx = db.transaction('decks', 'readonly');
    tx.objectStore('decks').openCursor().onsuccess = e => {
      const cur = e.target.result;
      if (cur) { out.push(cur.value); cur.continue(); }
      else res(out);
    };
    tx.onerror = () => rej(tx.error);
  });
}
async function loadDeckDB(name) {
  const db = STATE.db;
  return new Promise((res, rej) => {
    const tx = db.transaction('decks', 'readonly');
    const req = tx.objectStore('decks').get(name);
    req.onsuccess = () => res(req.result?.deck || null);
    req.onerror = () => rej(req.error);
  });
}
async function deleteDeckDB(name) {
  const db = STATE.db;
  return new Promise((res, rej) => {
    const tx = db.transaction('decks', 'readwrite');
    tx.objectStore('decks').delete(name);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// ─────────── Boot
async function load() {
  STATE.db = await openDB();
  const [cardsRes, manRes] = await Promise.all([
    fetch('cards.json').then(r => r.json()),
    fetch('manifest.json').then(r => r.json())
  ]);
  STATE.cards = cardsRes.cards;
  STATE.manifest = manRes;
  STATE.cards.forEach(c => STATE.cardsByID[c.id] = c);
  buildFilters(cardsRes.meta);
  applyURL();
  renderAll();
}

function buildFilters(meta) {
  const rDiv = document.getElementById('pool-rarity');
  rDiv.innerHTML = '';
  RARITY_ORDER.forEach(r => {
    const n = meta.rarityDistribution[r] || 0;
    if (!n) return;
    const chip = document.createElement('span');
    const label = r === 'uber-unique' ? 'Uber' : r[0].toUpperCase() + r.slice(1);
    chip.className = 'chip rar-' + r;
    chip.innerHTML = label + ' <span style="color:var(--dim)">' + n + '</span>';
    chip.onclick = () => { toggle('rarity', r, chip); render(); };
    rDiv.appendChild(chip);
  });
  const kDiv = document.getElementById('pool-kind');
  kDiv.innerHTML = '';
  Object.entries(meta.kindDistribution).sort((a,b)=>b[1]-a[1]).forEach(([k,n]) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.style.borderColor = KIND_COLORS[k] + '55';
    chip.innerHTML = k.toUpperCase() + ' <span style="color:var(--dim)">' + n + '</span>';
    chip.onclick = () => { toggle('kind', k, chip); render(); };
    kDiv.appendChild(chip);
  });
  const cDiv = document.getElementById('pool-chamber');
  cDiv.innerHTML = '';
  Object.entries(meta.chamberDistribution).sort((a,b)=>b[1]-a[1]).forEach(([c,n]) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.style.color = STATE.manifest.chambers[c]?.color || '';
    chip.innerHTML = c + ' <span style="color:var(--dim)">' + n + '</span>';
    chip.onclick = () => { toggle('chamber', c, chip); render(); };
    cDiv.appendChild(chip);
  });
}
function toggle(kind, val, el) {
  const s = STATE.filters[kind];
  if (s.has(val)) { s.delete(val); el.classList.remove('active'); }
  else { s.add(val); el.classList.add('active'); }
}

// ─────────── Deck ops
function addCard(id) {
  const card = STATE.cardsByID[id];
  if (!card) return;
  const cur = STATE.deck[id] || 0;
  if (cur >= maxCopiesFor(card)) return;
  if (deckSize() >= 30) return;
  STATE.deck[id] = cur + 1;
  renderAll();
}
function removeCard(id) {
  if (!STATE.deck[id]) return;
  STATE.deck[id]--;
  if (STATE.deck[id] <= 0) delete STATE.deck[id];
  renderAll();
}
function removeAll(id) {
  delete STATE.deck[id];
  renderAll();
}
function clearDeck() {
  STATE.deck = {};
  renderAll();
}

// ─────────── Deck rendering
function renderDeck() {
  const body = document.getElementById('deck-body');
  const count = document.getElementById('deck-n');
  const countEl = document.getElementById('deck-count');
  const size = deckSize();
  count.textContent = size;
  countEl.classList.remove('full', 'over');
  if (size === 30) countEl.classList.add('full');
  else if (size > 30) countEl.classList.add('over');

  const entries = Object.entries(STATE.deck).map(([id, n]) => ({card: STATE.cardsByID[id], n})).filter(x => x.card);
  if (!entries.length) {
    body.innerHTML = '<div class="deck-empty">◇ Empty deck<br><br>Click cards in the pool to add.<br>Load a preset from the bottom bar to start fast.</div>';
    return;
  }
  entries.sort((a,b) => a.card.cost - b.card.cost || rIdx(a.card.rarity) - rIdx(b.card.rarity) || a.card.name.localeCompare(b.card.name));
  // Group by cost
  const byCost = {};
  entries.forEach(e => { (byCost[e.card.cost] = byCost[e.card.cost] || []).push(e); });
  let html = '';
  for (let cost = 0; cost <= 10; cost++) {
    const rows = byCost[cost];
    if (!rows) continue;
    html += '<div class="deck-group"><div class="deck-group-head">✦ ' + cost + ' mana</div>';
    rows.forEach(({card, n}) => {
      const rarityClass = card.rarity === 'uber-unique' ? 'uber' : card.rarity === 'unique' ? 'unique' : '';
      html += `<div class="cost-row" data-id="${esc(card.id)}">
        <span class="cost-badge">${card.cost}</span>
        <span class="sigil" style="color:${RARITY_BORDER[card.rarity]?.c || '#b8b6ad'}">${card.sigil}</span>
        <span class="name ${rarityClass}" title="${esc(card.name)} · ${esc(card.chamber)}">${esc(card.name)}</span>
        <span class="copies">×${n}</span>
        <span class="rm" onclick="removeCard('${esc(card.id)}')">−</span>
        <span class="rm" onclick="removeAll('${esc(card.id)}')" title="remove all">✕</span>
      </div>`;
    });
    html += '</div>';
  }
  body.innerHTML = html;
}

// ─────────── Pool
function computeFilteredPool() {
  const f = STATE.filters;
  const q = f.search.trim().toLowerCase();
  let out = STATE.cards.filter(c => {
    if (f.rarity.size && !f.rarity.has(c.rarity)) return false;
    if (f.kind.size && !f.kind.has(c.kind)) return false;
    if (f.chamber.size && !f.chamber.has(c.chamber)) return false;
    if (q) {
      const hay = (c.name + ' ' + c.id + ' ' + c.chamber + ' ' + c.kind + ' ' + (c.keywords||[]).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  out.sort((a,b) => rIdx(a.rarity) - rIdx(b.rarity) || a.cost - b.cost || a.name.localeCompare(b.name));
  return out;
}

function renderPool() {
  STATE.filtered = computeFilteredPool();
  const grid = document.getElementById('pool-grid');
  const status = document.getElementById('pool-status');
  status.innerHTML = 'Pool: <b>' + STATE.filtered.length + '</b> · deck size <b>' + deckSize() + '/30</b>';
  const MAX = 200;
  const slice = STATE.filtered.slice(0, MAX);
  const frag = document.createDocumentFragment();
  slice.forEach(c => {
    const el = document.createElement('div');
    const inDeck = STATE.deck[c.id] || 0;
    const atMax = inDeck >= maxCopiesFor(c) || deckSize() >= 30;
    el.className = 'pcard rar-' + c.rarity + (atMax ? ' at-max' : '');
    el.title = c.name + ' · ' + c.chamber + ' · cost ' + c.cost + ' · ' + c.rarity + (inDeck ? ` · already in deck (×${inDeck})` : '');
    el.innerHTML = svgFor(c) + (inDeck ? `<div class="in-deck-badge">×${inDeck}</div>` : '');
    el.onclick = () => addCard(c.id);
    frag.appendChild(el);
  });
  grid.innerHTML = '';
  grid.appendChild(frag);
  if (STATE.filtered.length > MAX) {
    const more = document.createElement('div');
    more.style.gridColumn = '1/-1';
    more.style.padding = '16px';
    more.style.textAlign = 'center';
    more.style.color = 'var(--muted)';
    more.style.fontFamily = 'DM Mono, monospace';
    more.style.fontSize = '11px';
    more.textContent = 'Showing first ' + MAX + ' of ' + STATE.filtered.length + '. Refine filters to see more.';
    grid.appendChild(more);
  }
}

// ─────────── Analytics
function renderAnalytics() {
  const entries = Object.entries(STATE.deck).map(([id, n]) => ({card: STATE.cardsByID[id], n})).filter(x => x.card);
  const size = entries.reduce((s,x)=>s+x.n, 0);

  // Validity
  const val = document.getElementById('validity');
  if (size === 0) {
    val.className = 'validity no';
    val.textContent = '◊ Empty · click cards to add';
  } else if (size < 30) {
    val.className = 'validity no';
    val.textContent = `◇ ${size}/30 · need ${30 - size} more`;
  } else if (size === 30) {
    val.className = 'validity ok';
    val.textContent = '◊ Ready · 30 cards';
  } else {
    val.className = 'validity no';
    val.textContent = `◊ Over · ${size - 30} to remove`;
  }

  // Curve
  const curve = new Array(11).fill(0);
  entries.forEach(({card, n}) => { curve[card.cost] = (curve[card.cost] || 0) + n; });
  const max = Math.max(1, ...curve);
  let curveHtml = '<div class="curve-bar-row">';
  for (let i = 1; i <= 10; i++) {
    const h = (curve[i] / max) * 100;
    const over = curve[i] > 8;
    curveHtml += `<div class="curve-bar"><div class="curve-bar-fill ${over?'over':''}" style="height:${h}%"></div>${curve[i]?`<div class="curve-bar-count">${curve[i]}</div>`:''}</div>`;
  }
  curveHtml += '</div><div class="curve-labels">';
  for (let i = 1; i <= 10; i++) curveHtml += '<div class="curve-label">' + i + '</div>';
  curveHtml += '</div>';
  document.getElementById('curve').innerHTML = curveHtml;

  // Kinds donut
  const kinds = {};
  entries.forEach(({card, n}) => { kinds[card.kind] = (kinds[card.kind] || 0) + n; });
  renderDonut(document.getElementById('kind-donut'), document.getElementById('kind-legend'), kinds, KIND_COLORS);

  // Chambers
  renderDist(document.getElementById('chamber-dist'), (()=>{ const o={}; entries.forEach(({card,n})=>{o[card.chamber]=(o[card.chamber]||0)+n}); return o; })(), c => STATE.manifest.chambers[c]?.color);

  // Rarities
  renderDist(document.getElementById('rarity-dist'), (()=>{ const o={}; entries.forEach(({card,n})=>{o[card.rarity]=(o[card.rarity]||0)+n}); return o; })(), r => RARITY_BORDER[r]?.c);

  // Keywords
  const kws = {};
  entries.forEach(({card, n}) => { (card.keywords||[]).forEach(k => kws[k] = (kws[k]||0) + n); });
  renderDist(document.getElementById('keyword-dist'), kws, () => 'var(--brass)');

  // Warnings
  const warnings = [];
  if (size > 30) warnings.push('Deck oversized — remove <b>' + (size - 30) + '</b> cards');
  const chambers = Object.keys(entries.reduce((o,x)=>{o[x.card.chamber]=1;return o},{}));
  if (chambers.length >= 9 && size >= 25) warnings.push('◊ <b>Great Turning</b> primed — all 9 chambers present · turn 9 = draw 3');
  else if (chambers.length >= 5 && size >= 20) warnings.push('◊ <b>Chamber Circle</b> primed — 5+ chambers · +1 mana turn 1');
  const cost1 = entries.filter(x => x.card.cost <= 2).reduce((s,x)=>s+x.n,0);
  if (size >= 20 && cost1 < 4) warnings.push('Curve top-heavy — <b>' + cost1 + '</b> 1-2 cost cards · consider more low-cost plays');
  const cost5 = entries.filter(x => x.card.cost >= 6).reduce((s,x)=>s+x.n,0);
  if (size >= 20 && cost5 > 8) warnings.push('Curve bottom-heavy — <b>' + cost5 + '</b> 6+ cost cards · you may starve turns 1-3');
  const ubers = entries.filter(x => x.card.rarity === 'uber-unique').length;
  if (ubers > 3) warnings.push('◊ Genesis-heavy — ' + ubers + ' Ubers · rare in the wild');

  document.getElementById('warnings').innerHTML = warnings.map(w => '• ' + w).join('<br>');
}

function renderDonut(svg, legend, data, colorFn) {
  const total = Object.values(data).reduce((s,n)=>s+n, 0);
  if (!total) { svg.innerHTML = '<circle cx="50" cy="50" r="30" fill="none" stroke="#3d3a45" stroke-width="12"/>'; legend.innerHTML = '<div style="color:var(--dim);font-family:DM Mono,monospace;font-size:10px">no cards</div>'; return; }
  const C = 2 * Math.PI * 30;
  let offset = 0;
  let paths = '<circle cx="50" cy="50" r="30" fill="none" stroke="#191720" stroke-width="14"/>';
  let legendHtml = '';
  Object.entries(data).sort((a,b)=>b[1]-a[1]).forEach(([k, n]) => {
    const frac = n / total;
    const dash = frac * C;
    const color = typeof colorFn === 'function' ? colorFn(k) : (colorFn[k] || 'var(--gold)');
    paths += `<circle cx="50" cy="50" r="30" fill="none" stroke="${color}" stroke-width="14" stroke-dasharray="${dash} ${C}" stroke-dashoffset="${-offset}" transform="rotate(-90 50 50)"/>`;
    offset += dash;
    legendHtml += `<div class="donut-item"><span class="donut-dot" style="background:${color}"></span>${k}<span class="cnt">×${n}</span></div>`;
  });
  svg.innerHTML = paths;
  legend.innerHTML = legendHtml;
}
function renderDist(el, data, colorFn) {
  const total = Object.values(data).reduce((s,n)=>s+n, 0);
  if (!total) { el.innerHTML = '<div style="color:var(--dim);font-family:DM Mono, monospace;font-size:10px">—</div>'; return; }
  el.innerHTML = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k,n]) => {
    const color = colorFn ? (typeof colorFn === 'function' ? colorFn(k) : colorFn[k]) : 'var(--gold)';
    return `<div class="dist-row"><span class="lbl"><b>${k}</b></span><span class="bar"><span class="bar-fill" style="width:${(n/total*100).toFixed(0)}%;background:${color}"></span></span><span class="cnt">${n}</span></div>`;
  }).join('');
}

// ─────────── Master render
function renderAll() { renderDeck(); renderPool(); renderAnalytics(); }
function render() { renderPool(); renderAnalytics(); }

// ─────────── URL sync
function serializeDeck(deck) {
  // Compact base64 encoding of [{id,n}]
  const arr = Object.entries(deck).map(([id, n]) => id + ':' + n).join(';');
  return btoa(arr);
}
function deserializeDeck(str) {
  try {
    const raw = atob(str);
    const out = {};
    raw.split(';').forEach(pair => {
      const [id, nStr] = pair.split(':');
      if (id && nStr) out[id] = parseInt(nStr, 10) || 1;
    });
    return out;
  } catch (e) { return null; }
}
function applyURL() {
  const p = new URLSearchParams(location.search);
  const d = p.get('deck');
  if (d) {
    const deck = deserializeDeck(d);
    if (deck) STATE.deck = deck;
  }
  const n = p.get('name');
  if (n) document.getElementById('deckname').value = n;
}

// ─────────── Presets
function presetBlade() {
  clearDeck();
  // Tool-kind first, then low-cost SDKs to fill curve
  const tools = STATE.cards.filter(c => c.kind === 'tool').sort((a,b) => a.cost - b.cost || rIdx(a.rarity) - rIdx(b.rarity));
  const fillers = STATE.cards.filter(c => c.kind !== 'tool' && c.cost <= 3).sort((a,b) => a.cost - b.cost);
  const pool = tools.concat(fillers);
  let taken = 0;
  const used = {};
  for (const c of pool) {
    const max = maxCopiesFor(c);
    while ((used[c.id] || 0) < max && taken < 30) {
      used[c.id] = (used[c.id] || 0) + 1;
      taken++;
    }
    if (taken >= 30) break;
  }
  STATE.deck = used;
  document.getElementById('deckname').value = 'Aggro Blade';
  renderAll();
}
function presetLoom() {
  clearDeck();
  const pool = STATE.cards.filter(c => c.kind === 'mcp' || (c.kind === 'sdk' && c.cost >= 3));
  pool.sort((a,b) => a.cost - b.cost);
  let taken = 0;
  const used = {};
  for (const c of pool) {
    const max = maxCopiesFor(c);
    while ((used[c.id] || 0) < max && taken < 30) {
      used[c.id] = (used[c.id] || 0) + 1;
      taken++;
    }
    if (taken >= 30) break;
  }
  STATE.deck = used;
  document.getElementById('deckname').value = 'Combo Loom';
  renderAll();
}
function presetArch() {
  clearDeck();
  const pool = STATE.cards.filter(c => c.kind === 'surface' || c.kind === 'wellness' || (c.kind === 'api' && c.cost >= 4));
  pool.sort((a,b) => (rIdx(a.rarity)) - rIdx(b.rarity) || a.cost - b.cost);
  let taken = 0;
  const used = {};
  for (const c of pool) {
    const max = maxCopiesFor(c);
    while ((used[c.id] || 0) < max && taken < 30) {
      used[c.id] = (used[c.id] || 0) + 1;
      taken++;
    }
    if (taken >= 30) break;
  }
  STATE.deck = used;
  document.getElementById('deckname').value = 'Control Arch';
  renderAll();
}
function presetGenesis() {
  clearDeck();
  const used = {};
  const ubers = STATE.cards.filter(c => c.rarity === 'uber-unique');
  ubers.forEach(c => used[c.id] = 1);
  const uberChambers = new Set(ubers.map(c => c.chamber));
  const support = STATE.cards.filter(c => c.rarity !== 'uber-unique' && uberChambers.has(c.chamber));
  support.sort((a,b) => rIdx(a.rarity) - rIdx(b.rarity) || a.cost - b.cost);
  let taken = ubers.length;
  for (const c of support) {
    const max = maxCopiesFor(c);
    while ((used[c.id] || 0) < max && taken < 30) {
      used[c.id] = (used[c.id] || 0) + 1;
      taken++;
    }
    if (taken >= 30) break;
  }
  STATE.deck = used;
  document.getElementById('deckname').value = 'Genesis Bloodline';
  renderAll();
}

async function saveAction() {
  const name = document.getElementById('deckname').value.trim() || 'Untitled Deck';

  await saveDeckDB(name, STATE.deck);

    <div class="modal-actions"><button class="action primary" onclick="closeModal()">◊ Ok</button></div>`);
}
async function loadAction() {
  const decks = await listDecksDB();
  if (!decks.length) { openModal('<h2>◈ No saved decks</h2><div class="sub">Save one first with ◊ Save.</div><div class="modal-actions"><button class="action primary" onclick="closeModal()">◊ Ok</button></div>'); return; }
  const rows = decks.sort((a,b)=>(b.saved||'').localeCompare(a.saved||'')).map(d => `<div class="deck-list-row"><span class="n">${esc(d.name)}</span><span class="m">${d.size} cards · ${(d.saved||'').slice(0,10)}</span><button class="action" onclick="applyLoadedDeck('${esc(d.name)}')">◊ Load</button><span class="del" onclick="applyDeleteDeck('${esc(d.name)}')">✕ del</span></div>`).join('');
  openModal(`<h2>◈ Load Deck</h2><div class="sub">${decks.length} deck${decks.length===1?'':'s'} in your Vault</div><div class="deck-list">${rows}</div><div class="modal-actions"><button class="action" onclick="closeModal()">✕ Cancel</button></div>`);
}
async function applyLoadedDeck(name) {
  const d = await loadDeckDB(name);
  if (d) { STATE.deck = d; document.getElementById('deckname').value = name; renderAll(); closeModal(); }
}
async function applyDeleteDeck(name) {
  if (!confirm('Delete "' + name + '"?')) return;
  await deleteDeckDB(name);
  loadAction();
}
window.applyLoadedDeck = applyLoadedDeck;
window.applyDeleteDeck = applyDeleteDeck;

function exportURL() {
  const name = document.getElementById('deckname').value.trim() || 'Untitled Deck';
  const p = new URLSearchParams();
  p.set('deck', serializeDeck(STATE.deck));
  p.set('name', name);
  const url = location.origin + location.pathname + '?' + p.toString();
  navigator.clipboard.writeText(url);
  history.replaceState(null, '', '?' + p.toString());
  openModal(`<h2>◈ URL Copied</h2><div class="sub">Deck URL is in your clipboard · anyone with the link loads the same 30 cards</div>
    <textarea readonly>${esc(url)}</textarea>
    <div class="modal-actions"><button class="action primary" onclick="closeModal()">◊ Ok</button></div>`);
}
function exportJSON() {
  const name = document.getElementById('deckname').value.trim() || 'Untitled Deck';
  const bundle = { name, deck: STATE.deck, size: deckSize(), exported: new Date().toISOString(), source: 'fallkard' };
  const json = JSON.stringify(bundle, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/[^\w]/g, '-') + '.fallkard.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1200);
}
function importAction() {
  openModal(`<h2>◈ Import Deck</h2><div class="sub">Paste JSON export, deck URL, or base64 deck-string</div>
    <textarea id="imp-text" placeholder='Paste JSON export, URL with ?deck=…, or raw base64'></textarea>
    <div class="modal-actions">
      <button class="action primary" onclick="applyImport()">◊ Load</button>
      <button class="action" onclick="closeModal()">✕ Cancel</button>
    </div>`);
}
function applyImport() {
  const t = document.getElementById('imp-text').value.trim();
  if (!t) return;
  let deck = null, name = '';
  // Try JSON
  try {
    const j = JSON.parse(t);
    if (j.deck) { deck = j.deck; name = j.name || 'Imported'; }
  } catch (_) {}
  // Try URL
  if (!deck) {
    try {
      const m = t.match(/[?&]deck=([^&]+)/);
      if (m) deck = deserializeDeck(decodeURIComponent(m[1]));
      const nm = t.match(/[?&]name=([^&]+)/);
      if (nm) name = decodeURIComponent(nm[1]);
    } catch (_) {}
  }
  // Try raw base64
  if (!deck) deck = deserializeDeck(t);

  if (!deck || !Object.keys(deck).length) { alert('Could not parse. Expected JSON export, deck URL, or base64 string.'); return; }
  // Validate
  const good = {};
  Object.entries(deck).forEach(([id, n]) => { if (STATE.cardsByID[id]) good[id] = Math.min(n, maxCopiesFor(STATE.cardsByID[id])); });
  STATE.deck = good;
  if (name) document.getElementById('deckname').value = name;
  closeModal();
  renderAll();
}
window.applyImport = applyImport;

function newDeck() {
  if (deckSize() && !confirm('Clear current deck?')) return;
  clearDeck();
  document.getElementById('deckname').value = 'Untitled Deck';
  history.replaceState(null, '', location.pathname);
}

// ─────────── Wire
document.getElementById('pool-search').addEventListener('input', e => { STATE.filters.search = e.target.value; render(); });
document.getElementById('deck-clear').addEventListener('click', () => { if (deckSize() && !confirm('Clear deck?')) return; clearDeck(); });
document.getElementById('save').addEventListener('click', saveAction);
document.getElementById('load').addEventListener('click', loadAction);
document.getElementById('exp-url').addEventListener('click', exportURL);
document.getElementById('exp-json').addEventListener('click', exportJSON);
document.getElementById('imp').addEventListener('click', importAction);
document.getElementById('new').addEventListener('click', newDeck);
document.getElementById('preset-blade').addEventListener('click', presetBlade);
document.getElementById('preset-loom').addEventListener('click', presetLoom);
document.getElementById('preset-arch').addEventListener('click', presetArch);
document.getElementById('preset-genesis').addEventListener('click', presetGenesis);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveAction(); }
});

load().catch(e=>{const s=document.getElementById('pool-status'); if(s) s.textContent='Failed to load pool — refresh to retry.'; console.error('[fallkard] Loom load failed',e);});
</script>
