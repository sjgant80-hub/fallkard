<svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg" width="300" height="420">
  <defs>
    <radialGradient id="g_fallmirror" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#e6846e" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#141218" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0b0a0f" stop-opacity="1"/>
    </radialGradient>
    <filter id="grain_fallmirror" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.06  0 0 0 0 0.06  0 0 0 0 0.08  0 0 0 0.14 0"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="300" height="420" fill="url(#g_fallmirror)" rx="10"/>
  <rect x="0" y="0" width="300" height="420" fill="url(#g_fallmirror)" filter="url(#grain_fallmirror)" rx="10" opacity="0.6"/>

  <!-- Rarity border -->
  <rect x="4" y="4" width="292" height="412" fill="none" stroke="#c46a2e" stroke-width="2" rx="8" opacity="0.9"
        filter="drop-shadow(0 0 20px #c46a2e)"/>

  <!-- Corner brackets -->
  <path d="M 8 22 L 8 8 L 22 8" fill="none" stroke="#c46a2e" stroke-width="1.2"/>
  <path d="M 292 22 L 292 8 L 278 8" fill="none" stroke="#c46a2e" stroke-width="1.2"/>
  <path d="M 8 398 L 8 412 L 22 412" fill="none" stroke="#c46a2e" stroke-width="1.2"/>
  <path d="M 292 398 L 292 412 L 278 412" fill="none" stroke="#c46a2e" stroke-width="1.2"/>

  <!-- Sigil top-left -->
  <text x="22" y="42" font-family="DM Mono, monospace" font-size="24" fill="#c46a2e" opacity="0.85">◐</text>

  <!-- Kind badge top-right -->
  <rect x="215" y="22" width="70" height="22" fill="rgba(11,10,15,0.9)" stroke="#c46a2e" stroke-width="0.6" rx="3"/>
  <text x="250" y="38" font-family="DM Mono, monospace" font-size="10" fill="#c46a2e" text-anchor="middle" letter-spacing="1.5">WELLNESS</text>

  <!-- Central emblem -->
  <ellipse cx="150" cy="270" rx="65" ry="14" fill="#e6846e" opacity="0.35" stroke="#c46a2e" stroke-width="1"/>
             <ellipse cx="150" cy="180" rx="55" ry="12" fill="#e6846e" opacity="0.55" stroke="#c46a2e" stroke-width="1"/>
             <ellipse cx="150" cy="130" rx="40" ry="9" fill="#e6846e" opacity="0.7" stroke="#c46a2e" stroke-width="1"/>
             <line x1="95" y1="180" x2="85" y2="270" stroke="#c46a2e" stroke-width="1"/>
             <line x1="205" y1="180" x2="215" y2="270" stroke="#c46a2e" stroke-width="1"/>

  <!-- Divider before name -->
  <line x1="30" y1="315" x2="270" y2="315" stroke="#c46a2e" stroke-width="0.7" opacity="0.5"/>

  <!-- Name -->
  <text x="150" y="336" font-family="Libre Baskerville, serif" font-size="15" fill="#e6d8b0" text-anchor="middle" font-weight="700">The Mirror</text>

  <!-- Chamber line -->
  <text x="150" y="352" font-family="DM Mono, monospace" font-size="8" fill="#e6846e" text-anchor="middle" letter-spacing="2.5">CLINIC</text>

  <!-- Type-line -->
  <text x="150" y="366" font-family="DM Mono, monospace" font-size="7" fill="#8a857a" text-anchor="middle" letter-spacing="1.2">Uber-unique · Well Shape · Clinic</text>

  <!-- Flavour -->
  <text x="150" y="384" font-family="Libre Baskerville, serif" font-size="8" fill="#8a857a" text-anchor="middle" font-style="italic">Seven shapes of the shape.</text>

  <!-- Stats bar -->
  <rect x="8" y="390" width="284" height="20" fill="rgba(11,10,15,0.9)" stroke="#c46a2e" stroke-width="0.6" rx="3"/>
  <text x="30" y="405" font-family="DM Mono, monospace" font-size="12" fill="#d44a4a" font-weight="700">⚔ 2</text>
  <text x="118" y="405" font-family="DM Mono, monospace" font-size="12" fill="#5aa25c" font-weight="700">♥ 8</text>
  <text x="200" y="405" font-family="DM Mono, monospace" font-size="12" fill="#e6846e" font-weight="700">✦ 4</text>

  <!-- Socket dots -->
  <circle cx="255" cy="400" r="3" fill="#3d3a45" stroke="#c46a2e" stroke-width="0.6"/><circle cx="265" cy="400" r="3" fill="#3d3a45" stroke="#c46a2e" stroke-width="0.6"/>
</svg>